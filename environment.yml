# pip freeze will show the exact versions of the packages installed.

name: rag
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - python-dotenv
  - jupyter
  - ipykernel
  - ipywidgets
  - poppler
  - tesseract
  - pandoc
  - ruff
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.5.1+cpu
      - "unstructured[pdf]"
      - "unstructured"
      - sentence-transformers
      - python-magic
      - pdfplumber
      - seaborn
      - tqdm
      - gensim
      - umap-learn
      - nltk
      - pypdf
      - pillow
      - pyarrow
      - pickle
      - rank-bm25
      - fastapi
      - uvicorn
      - transformers
      - click
      - chromadb