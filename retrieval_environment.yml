name: retrieval
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - python-dotenv
  - jupyter
  - ipykernel
  - ipywidgets
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch>=2.6
      - sentence-transformers
      - scikit-learn
      - seaborn
      - tqdm
      - umap-learn
      - pillow
      - gensim
      - nltk
      - pdfplumber